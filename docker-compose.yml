services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: weighttracker
      POSTGRES_PASSWORD: weighttracker
      POSTGRES_DB: weighttracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://weighttracker:weighttracker@db:5432/weighttracker
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
